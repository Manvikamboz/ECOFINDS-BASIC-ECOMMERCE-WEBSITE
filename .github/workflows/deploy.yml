name: EcoFinds CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint check (optional)
        run: echo "No linter configured — skipping"

      - name: Run tests
        run: npm test || echo "No tests found — skipping"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Verify server entry point exists
        run: |
          if [ -f "server.js" ]; then
            echo "✅ server.js found"
          else
            echo "❌ server.js not found!" && exit 1
          fi

      - name: Deployment placeholder
        run: |
          echo "🚀 EcoFinds deployment step"
          echo "Add your deploy commands here (e.g., SSH to server, push to Railway/Render/Heroku, etc.)"
          echo "Example secrets to configure in GitHub Settings → Secrets:"
          echo "  - DEPLOY_HOST"
          echo "  - DEPLOY_USER"
          echo "  - DEPLOY_KEY"
          echo "  - DB_HOST, DB_USER, DB_PASSWORD"
